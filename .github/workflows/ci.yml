name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Build must succeed without secrets; the contact route reads these
          # at request time, not build time.
          RESEND_API_KEY: ""
          CONTACT_TO_EMAIL: ""
          CONTACT_FROM_EMAIL: ""
